# See https://aka.ms/yaml

trigger:
  - master
  - stable-v*
  - dev/stable-v*/*
pr:
  - master

resources:
  containers:
  - container: centos8
    image: ucfconsort.azurecr.io/rdma-core/centos8:44.0
    endpoint: ucfconsort_registry2
  - container: centos9
    image: ucfconsort.azurecr.io/rdma-core/centos9:44.0
    endpoint: ucfconsort_registry2

jobs:
# Control: non-matrix
- job: NonMatrix_RuntimeExpr_Endpoint
  displayName: "Control: non-matrix + endpoint + runtime expr"
  pool:
    vmImage: ubuntu-latest
  variables:
    CONTAINER: centos9
  container: $[ variables['CONTAINER'] ]
  steps:
  - bash: |
      echo "CONTAINER=$(CONTAINER)"
      cat /etc/os-release
    displayName: "Show OS"
  - bash: |
      echo "=== Variables ==="
      echo "CONTAINER='$(CONTAINER)'"
      echo "system.jobId='$(system.jobId)'"
      echo "system.planId='$(system.planId)'"
      echo "system.teamProjectId='$(system.teamProjectId)'"
      echo "system.hostType='$(system.hostType)'"
      echo "system.collectionUri='$(system.collectionUri)'"

      SC_ID="69c907bf-fdb7-43c8-84a8-6afeead023ba"

      echo "=== Service connection details ==="
      SC_URL="$(system.collectionUri)$(system.teamProjectId)/_apis/serviceendpoint/endpoints/${SC_ID}?api-version=7.1"
      curl -s \
        -H "Authorization: Bearer $(System.AccessToken)" \
        "$SC_URL" | python3 -m json.tool 2>/dev/null || curl -s \
        -H "Authorization: Bearer $(System.AccessToken)" \
        "$SC_URL"

      echo "=== Calling OIDC token endpoint (with serviceConnectionId) ==="
      URL="$(system.collectionUri)$(system.teamProjectId)/_apis/distributedtask/hubs/build/plans/$(system.planId)/jobs/$(system.jobId)/oidctoken?serviceConnectionId=${SC_ID}&api-version=7.1-preview.1"
      echo "POST $URL"
      curl -s -w "\nHTTP_STATUS:%{http_code}\n" \
        -X POST \
        -H "Authorization: Bearer $(System.AccessToken)" \
        -H "Content-Type: application/json" \
        -d '{}' \
        "$URL"
    displayName: "Dump variables + test OIDC endpoint"
    target: host
    condition: always()
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)

# Repro: matrix
- job: Matrix_RuntimeExpr_Endpoint
  displayName: "Repro: matrix + endpoint + runtime expr"
  pool:
    vmImage: ubuntu-latest
  strategy:
    matrix:
      u2004:
        CONTAINER: centos9
      u2204:
        CONTAINER: centos8
  container: $[ variables['CONTAINER'] ]
  steps:
  - bash: |
      echo "CONTAINER=$(CONTAINER)"
      cat /etc/os-release
    displayName: "Show OS"
  - bash: |
      echo "=== Variables ==="
      echo "CONTAINER='$(CONTAINER)'"
      echo "system.jobId='$(system.jobId)'"
      echo "system.planId='$(system.planId)'"
      echo "system.teamProjectId='$(system.teamProjectId)'"
      echo "system.hostType='$(system.hostType)'"
      echo "system.collectionUri='$(system.collectionUri)'"

      SC_ID="69c907bf-fdb7-43c8-84a8-6afeead023ba"

      echo "=== Service connection details ==="
      SC_URL="$(system.collectionUri)$(system.teamProjectId)/_apis/serviceendpoint/endpoints/${SC_ID}?api-version=7.1"
      curl -s \
        -H "Authorization: Bearer $(System.AccessToken)" \
        "$SC_URL" | python3 -m json.tool 2>/dev/null || curl -s \
        -H "Authorization: Bearer $(System.AccessToken)" \
        "$SC_URL"

      echo "=== Calling OIDC token endpoint (with serviceConnectionId) ==="
      URL="$(system.collectionUri)$(system.teamProjectId)/_apis/distributedtask/hubs/build/plans/$(system.planId)/jobs/$(system.jobId)/oidctoken?serviceConnectionId=${SC_ID}&api-version=7.1-preview.1"
      echo "POST $URL"
      curl -s -w "\nHTTP_STATUS:%{http_code}\n" \
        -X POST \
        -H "Authorization: Bearer $(System.AccessToken)" \
        -H "Content-Type: application/json" \
        -d '{}' \
        "$URL"
    displayName: "Dump variables + test OIDC endpoint"
    target: host
    condition: always()
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
